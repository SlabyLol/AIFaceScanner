<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DarkFox AI - Terminal v2.0</title>
    <script src="dist/face-api.min.js"></script>
    <style>
        :root { --accent: #5efcff; --bg: #04080d; --panel: #0b141d; --border: #1a2f3f; --text: #e2f8ff; --warning: #ff4d00; }
        * { box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .main-container { width: 95vw; max-width: 720px; display: flex; flex-direction: column; gap: 10px; }
        .viewport { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 12px; overflow: hidden; border: 2px solid var(--border); box-shadow: 0 0 30px rgba(94, 252, 255, 0.1); }
        video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .badge { position: absolute; z-index: 20; background: rgba(0,0,0,0.8); padding: 6px 12px; border-radius: 4px; font-size: 10px; border: 1px solid var(--accent); color: var(--accent); font-weight: 900; }
        #mode-display { top: 12px; left: 12px; }
        #target-count { top: 12px; right: 12px; color: var(--warning); border-color: var(--warning); }
        #overlay { position: absolute; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .boot-logo { width: 140px; border-radius: 50%; box-shadow: 0 0 25px var(--accent); margin-bottom: 25px; }
        .btn { padding: 12px 24px; background: transparent; color: var(--accent); border: 1px solid var(--accent); border-radius: 4px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 11px; transition: 0.2s; }
        .btn:hover, .btn.active { background: var(--accent); color: #000; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .data-card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 12px; text-align: center; }
        .label-tag { font-size: 9px; color: var(--accent); font-weight: bold; }
        .label-val { font-size: 15px; font-family: monospace; display: block; margin-top: 4px; }
        .console { background: #010409; border-radius: 8px; padding: 10px; height: 90px; overflow-y: auto; font-family: monospace; font-size: 10px; color: #555; border: 1px solid var(--border); }
        input[type="file"] { display: none; }
        .controls { display: flex; gap: 10px; justify-content: center; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="viewport" id="wrapper">
            <div class="badge" id="mode-display">OFFLINE</div>
            <div class="badge" id="target-count">TARGETS: 0</div>
            <div id="overlay">
                <img src="IMG_0643.jpeg" class="boot-logo">
                <div id="ui-box" style="display:flex; gap:12px;">
                    <button class="btn" onclick="start('camera')">Live Feed</button>
                    <label class="btn" for="video-upload">Import Video</label>
                </div>
                <input type="file" id="video-upload" accept="video/*" onchange="start('import')">
                <div id="status" style="margin-top:20px; font-size:10px; color:var(--accent); display:none;">INITIALIZING NEURAL LAYERS...</div>
            </div>
            <video id="video" muted playsinline loop crossorigin="anonymous"></video>
        </div>

        <div class="data-grid">
            <div class="data-card"><span class="label-tag">SEX</span><span id="val-g" class="label-val">--</span></div>
            <div class="data-card"><span class="label-tag">AGE</span><span id="val-a" class="label-val">--</span></div>
            <div class="data-card"><span class="label-tag">MOOD</span><span id="val-e" class="label-val">--</span></div>
        </div>

        <div class="controls">
            <button class="btn" id="mesh-toggle" onclick="toggleMesh()">Activate 3D Mesh</button>
        </div>

        <div class="console" id="log">> STANDBY...</div>
    </div>

    <script>
        const video = document.getElementById('video');
        const logBox = document.getElementById('log');
        let canvas, ctx, useMesh = false;
        const MODEL_URL = './weights/';

        function log(m) { logBox.innerHTML = `<div>[${new Date().toLocaleTimeString()}] > ${m}</div>` + logBox.innerHTML; }
        function toggleMesh() { 
            useMesh = !useMesh; 
            document.getElementById('mesh-toggle').classList.toggle('active');
            log(`SYSTEM: 3D Mesh ${useMesh ? 'ENABLED' : 'DISABLED'}`);
        }

        async function start(mode) {
            document.getElementById('ui-box').style.display = 'none';
            document.getElementById('status').style.display = 'block';

            try {
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);
                await faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL);
                log("MODELS LOADED");

                if(mode === 'camera') {
                    video.srcObject = await navigator.mediaDevices.getUserMedia({ video: true });
                    document.getElementById('mode-display').innerText = "LIVE CAMERA";
                } else {
                    const file = document.getElementById('video-upload').files[0];
                    video.src = URL.createObjectURL(file);
                    document.getElementById('mode-display').innerText = "VIDEO IMPORT";
                }

                video.onloadeddata = () => {
                    video.play();
                    document.getElementById('overlay').style.display = 'none';
                    initAI();
                };
            } catch(e) { log("BOOT ERROR: " + e.message); }
        }

        function initAI() {
            canvas = faceapi.createCanvasFromMedia(video);
            document.getElementById('wrapper').append(canvas);
            ctx = canvas.getContext('2d');
            detect();
        }

        async function detect() {
            if(video.paused || video.readyState < 2) return requestAnimationFrame(detect);

            const dims = { width: video.offsetWidth, height: video.offsetHeight };
            if(canvas.width !== dims.width) faceapi.matchDimensions(canvas, dims);

            // Hohe inputSize (416) findet kleine Gesichter in Videos besser
            const results = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 416, scoreThreshold: 0.25 }))
                .withFaceLandmarks().withFaceExpressions().withAgeAndGender();

            const resized = faceapi.resizeResults(results, dims);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            document.getElementById('target-count').innerText = `TARGETS: ${resized.length}`;

            if(resized.length > 0) {
                const p = resized[0];
                document.getElementById('val-g').innerText = p.gender.toUpperCase();
                document.getElementById('val-a').innerText = Math.round(p.age);
                document.getElementById('val-e').innerText = Object.keys(p.expressions).reduce((a,b)=>p.expressions[a]>p.expressions[b]?a:b).toUpperCase();

                resized.forEach(res => {
                    ctx.strokeStyle = '#5efcff';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(res.detection.box.x, res.detection.box.y, res.detection.box.width, res.detection.box.height);
                    
                    if(useMesh) {
                        faceapi.draw.drawFaceLandmarks(canvas, res);
                    }
                });
            }
            requestAnimationFrame(detect);
        }
    </script>
</body>
</html>
