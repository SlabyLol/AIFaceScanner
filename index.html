<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DarkFox AI - Terminal v4.7</title>
    <script src="dist/face-api.min.js"></script>
    <style>
        :root { --accent: #5efcff; --bg: #04080d; --panel: #0b141d; --border: #1a2f3f; --text: #e2f8ff; --warning: #ff4d00; --log-btn: #ffcc00; --mesh-btn: #00ff66; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Consolas', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        
        .main-container { width: 95vw; max-width: 720px; display: flex; flex-direction: column; gap: 10px; z-index: 5; }

        /* VIEWPORT */
        .viewport { 
            position: relative; width: 100%; aspect-ratio: 4/3;
            background: #000; border-radius: 12px; overflow: hidden; border: 2px solid var(--border);
            box-shadow: 0 0 40px rgba(94, 252, 255, 0.2);
        }
        video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; transform: scaleX(-1); }

        /* BADGES */
        .badge {
            position: absolute; z-index: 20; background: rgba(0,0,0,0.85); 
            padding: 6px 14px; border-radius: 4px; font-size: 11px; 
            border: 1px solid var(--accent); color: var(--accent); font-weight: 900;
        }
        #mode-display { top: 12px; left: 12px; }
        #target-count { top: 12px; right: 12px; color: var(--warning); border-color: var(--warning); }

        /* BOOT SCREEN */
        #boot-screen {
            position: absolute; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        .boot-logo { width: 130px; height: 130px; border-radius: 50%; box-shadow: 0 0 30px var(--accent); margin-bottom: 25px; }
        
        .btn-init {
            padding: 12px 24px; background: transparent; color: var(--accent);
            border: 1px solid var(--accent); border-radius: 4px; font-weight: 800; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px; font-size: 12px; transition: 0.3s;
        }
        .btn-init:hover { background: var(--accent); color: #000; box-shadow: 0 0 20px var(--accent); }

        /* CONTROLS */
        .controls-container {
            position: fixed; bottom: 20px; right: 20px; z-index: 200;
            display: flex; flex-direction: column; gap: 10px;
        }
        .ctrl-btn {
            background: rgba(0,0,0,0.8); padding: 10px 15px; border-radius: 5px; 
            font-size: 10px; font-weight: bold; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }
        #log-trigger { color: var(--log-btn); border: 1px solid var(--log-btn); }
        #mesh-trigger { color: var(--mesh-btn); border: 1px solid var(--mesh-btn); }
        #mesh-trigger.active { background: var(--mesh-btn); color: #000; box-shadow: 0 0 15px var(--mesh-btn); }

        /* MODAL */
        #log-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 300; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content {
            background: var(--panel); border: 1px solid var(--log-btn); width: 100%; max-width: 550px;
            padding: 20px; border-radius: 10px; position: relative;
        }
        #log-text { font-size: 11px; color: #8899aa; white-space: pre-wrap; max-height: 350px; overflow-y: auto; user-select: all; cursor: text; }
        .close-btn { position: absolute; top: 10px; right: 10px; color: #666; cursor: pointer; font-size: 20px; }

        /* DATA DISPLAY */
        .data-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .data-card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 12px; text-align: center; }
        .label-tag { font-size: 9px; color: var(--accent); font-weight: bold; }
        .label-val { font-size: 16px; font-weight: 900; display: block; margin-top: 4px; }

        .console { 
            background: #010409; border-radius: 8px; padding: 10px; height: 90px; 
            overflow-y: auto; font-size: 10px; color: #445566; border: 1px solid var(--border);
        }
    </style>
</head>
<body>

    <div class="controls-container">
        <button id="mesh-trigger" class="ctrl-btn" onclick="toggleMesh()">3D Mesh OFF</button>
        <button id="log-trigger" class="ctrl-btn" onclick="showExternalLog()">Update-Log.txt</button>
    </div>

    <div id="log-modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div style="color:var(--log-btn); margin-bottom:10px; font-weight:bold;">REPOSITORY: update-log.txt (Kopierbar)</div>
            <div id="log-text">Fetching data from server...</div>
        </div>
    </div>

    <div class="main-container">
        <div class="viewport" id="viewport-wrapper">
            <div class="badge" id="mode-display">SYSTEM: STANDBY</div>
            <div class="badge" id="target-count">TARGETS: 0</div>
            
            <div id="boot-screen">
                <img src="IMG_0643.jpeg" class="boot-logo">
                <button class="btn-init" id="init-button" onclick="bootSystem()">System Initialisieren</button>
            </div>
            
            <video id="webcam" autoplay muted playsinline></video>
        </div>

        <div class="data-grid">
            <div class="data-card"><span class="label-tag">GESCHLECHT</span><span id="gender-val" class="label-val">--</span></div>
            <div class="data-card"><span class="label-tag">ALTER</span><span id="age-val" class="label-val">--</span></div>
            <div class="data-card"><span class="label-tag">EMOTION</span><span id="emotion-val" class="label-val">--</span></div>
        </div>

        <div class="console" id="terminal-output">> WAITING FOR INITIALIZATION...</div>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const terminalOutput = document.getElementById('terminal-output');
        let overlayCanvas, drawingContext, isMeshEnabled = false;

        function updateTerminal(message) {
            const entry = document.createElement('div');
            entry.innerText = `[${new Date().toLocaleTimeString()}] > ${message}`;
            terminalOutput.prepend(entry);
        }

        function toggleMesh() {
            isMeshEnabled = !isMeshEnabled;
            const btn = document.getElementById('mesh-trigger');
            btn.classList.toggle('active');
            btn.innerText = isMeshEnabled ? "3D Mesh ON" : "3D Mesh OFF";
            updateTerminal(`SYSTEM: 3D Mesh Engine ${isMeshEnabled ? 'ENABLED' : 'DISABLED'}`);
        }

        async function showExternalLog() {
            document.getElementById('log-modal').style.display = 'flex';
            try {
                const response = await fetch('update-log.txt');
                const content = response.ok ? await response.text() : "Log file not found in root directory.";
                document.getElementById('log-text').innerText = content;
            } catch (err) { document.getElementById('log-text').innerText = "Network Error: Could not reach update-log.txt"; }
        }

        function closeModal() { document.getElementById('log-modal').style.display = 'none'; }

        async function bootSystem() {
            document.getElementById('init-button').innerText = "LOADING...";
            updateTerminal("BOOT: Loading neural network weights...");

            const weightsDir = './weights/';
            try {
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(weightsDir),
                    faceapi.nets.faceLandmark68Net.loadFromUri(weightsDir),
                    faceapi.nets.faceExpressionNet.loadFromUri(weightsDir),
                    faceapi.nets.ageGenderNet.loadFromUri(weightsDir)
                ]);

                const userStream = await navigator.mediaDevices.getUserMedia({ video: true });
                videoElement.srcObject = userStream;

                videoElement.onloadedmetadata = () => {
                    document.getElementById('boot-screen').style.opacity = '0';
                    setTimeout(() => document.getElementById('boot-screen').remove(), 1000);
                    document.getElementById('mode-display').innerText = "SYSTEM: LIVE FEED";
                    runNeuralProcessing();
                };
            } catch(err) { updateTerminal("FATAL BOOT ERROR: " + err.message); }
        }

        async function runNeuralProcessing() {
            overlayCanvas = faceapi.createCanvasFromMedia(videoElement);
            document.getElementById('viewport-wrapper').append(overlayCanvas);
            drawingContext = overlayCanvas.getContext('2d');

            const processingLoop = async () => {
                const displayDimensions = { width: videoElement.offsetWidth, height: videoElement.offsetHeight };
                if (overlayCanvas.width !== displayDimensions.width) faceapi.matchDimensions(overlayCanvas, displayDimensions);

                const detections = await faceapi.detectAllFaces(videoElement, new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.4 }))
                    .withFaceLandmarks().withFaceExpressions().withAgeAndGender();

                const scaledResults = faceapi.resizeResults(detections, displayDimensions);
                drawingContext.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
                document.getElementById('target-count').innerText = `TARGETS: ${scaledResults.length}`;

                if(scaledResults.length > 0) {
                    const primary = scaledResults[0];
                    document.getElementById('gender-val').innerText = primary.gender.toUpperCase();
                    document.getElementById('age-val').innerText = Math.round(primary.age) + " YRS";
                    document.getElementById('emotion-val').innerText = Object.keys(primary.expressions).reduce((a,b)=>primary.expressions[a]>primary.expressions[b]?a:b).toUpperCase();

                    scaledResults.forEach((result, idx) => {
                        drawingContext.strokeStyle = '#5efcff';
                        drawingContext.lineWidth = 2;
                        drawingContext.strokeRect(result.detection.box.x, result.detection.box.y, result.detection.box.width, result.detection.box.height);
                        
                        if(isMeshEnabled) {
                            faceapi.draw.drawFaceLandmarks(overlayCanvas, result);
                        }
                        
                        drawingContext.save();
                        drawingContext.scale(-1, 1);
                        drawingContext.fillStyle = '#5efcff';
                        drawingContext.font = 'bold 12px Consolas';
                        drawingContext.fillText(`ID#00${idx+1}`, -(result.detection.box.x + 5), result.detection.box.y - 7);
                        drawingContext.restore();
                    });
                }
                requestAnimationFrame(processingLoop);
            };
            processingLoop();
        }
    </script>
</body>
</html>
