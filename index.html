<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DarkFox AI - Biometric Terminal</title>
    <script src="dist/face-api.min.js"></script>
    <style>
        /* COLOR THEME MATCHING YOUR LOGO (CYAN/BLUE) */
        :root { 
            --accent: #5efcff; 
            --bg: #04080d; 
            --panel: #0b141d; 
            --border: #1a2f3f; 
            --text: #e2f8ff; 
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
        }

        .main-container { width: 95vw; max-width: 720px; display: flex; flex-direction: column; gap: 12px; }

        /* VIEWPORT (CAMERA) */
        .viewport { 
            position: relative; width: 100%; aspect-ratio: 4/3;
            background: #000; border-radius: 12px; overflow: hidden; border: 2px solid var(--border);
            box-shadow: 0 0 40px rgba(94, 252, 255, 0.15);
        }
        video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 5; }

        /* WATERMARK LOGO */
        .watermark {
            position: absolute; top: 15px; right: 15px; width: 55px; height: 55px;
            z-index: 10; opacity: 0.6; pointer-events: none; display: none; border-radius: 50%;
        }

        /* INITIALIZATION SCREEN */
        #overlay {
            position: absolute; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50;
        }
        
        /* YOUR LOGO (IMG_0643.jpeg) */
        .boot-logo { width: 180px; height: 180px; margin-bottom: 25px; border-radius: 50%; box-shadow: 0 0 30px var(--accent); }
        
        #start-btn {
            padding: 15px 45px; background: transparent; color: var(--accent);
            border: 2px solid var(--accent); border-radius: 6px; font-weight: 800; cursor: pointer;
            letter-spacing: 2px; text-transform: uppercase; transition: 0.3s;
        }
        #start-btn:hover { background: var(--accent); color: #000; }
        
        .loader { display: none; width: 260px; text-align: center; }
        .bar-bg { width: 100%; height: 4px; background: #1e293b; margin: 15px 0; overflow: hidden; border-radius: 2px; }
        #bar-fill { width: 0%; height: 100%; background: var(--accent); box-shadow: 0 0 10px var(--accent); transition: width 0.3s; }

        /* BIOMETRIC CARDS */
        .data-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .data-card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 12px; text-align: center; }
        .active { border-color: var(--accent); box-shadow: 0 0 15px rgba(94, 252, 255, 0.2); }
        .label-tag { font-size: 10px; color: var(--accent); font-weight: bold; margin-bottom: 4px; display: block; }
        .label-val { font-size: 16px; font-family: monospace; font-weight: 900; }

        /* DEBUG LOG (ENGLISH) */
        .console { 
            background: #020617; border-radius: 8px; padding: 12px;
            height: 130px; overflow-y: auto; font-family: 'Consolas', monospace;
            font-size: 10px; border: 1px solid var(--border); color: #94a3b8;
        }
        .log-file { color: var(--accent); }

        .copyright { font-size: 11px; color: #475569; text-align: center; margin-top: 10px; font-weight: bold; letter-spacing: 1px; }

        /* PULSE EFFECT */
        .pulse { animation: pulse-anim 2.5s infinite; }
        @keyframes pulse-anim { 0%, 100% { opacity: 0.7; transform: scale(1); } 50% { opacity: 1; transform: scale(1.03); } }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="viewport" id="wrapper">
            <img src="IMG_0643.jpeg" class="watermark" id="watermark">
            
            <div id="overlay">
                <img src="IMG_0643.jpeg" class="boot-logo pulse" id="main-logo">
                <button id="start-btn" onclick="bootDarkFox()">Initialize System</button>
                
                <div class="loader" id="loader">
                    <div id="load-status" style="font-size: 11px; color: var(--accent); font-weight: bold;">LOADING BIOMETRIC DATA...</div>
                    <div class="bar-bg"><div id="bar-fill"></div></div>
                </div>
            </div>
            <video id="video" autoplay muted playsinline></video>
        </div>

        <div class="data-grid">
            <div class="data-card" id="card-g"><span class="label-tag">GENDER [G]</span><span class="label-val" id="val-g">--</span></div>
            <div class="data-card" id="card-a"><span class="label-tag">AGE [A]</span><span class="label-val" id="val-a">--</span></div>
            <div class="data-card" id="card-e"><span class="label-tag">EMOTION [E]</span><span class="label-val" id="val-e">--</span></div>
        </div>

        <div class="console" id="terminal">> DARKFOX OS v2026.03 - SYSTEM STANDBY...</div>
        
        <div class="copyright">Copyright DarkFox Co. 2026</div>
    </div>

    <script>
        const video = document.getElementById('video');
        const terminal = document.getElementById('terminal');
        const barFill = document.getElementById('bar-fill');
        const loadStatus = document.getElementById('load-status');
        const watermark = document.getElementById('watermark');
        
        const vals = { g: document.getElementById('val-g'), a: document.getElementById('val-a'), e: document.getElementById('val-e') };
        const cards = { g: document.getElementById('card-g'), a: document.getElementById('card-a'), e: document.getElementById('card-e') };

        const repoName = window.location.pathname.split('/')[1];
        const MODEL_URL = window.location.hostname.includes('github.io') ? `/${repoName}/weights/` : './weights/';

        function log(msg, isFile = false) {
            const div = document.createElement('div');
            div.innerHTML = `[${new Date().toLocaleTimeString()}] > <span class="${isFile ? 'log-file' : ''}">${msg}</span>`;
            terminal.prepend(div);
        }

        async function bootDarkFox() {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            
            log("BOOT: Requesting data shards...");

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;

                const models = [
                    { n: 'Face_Detector', net: faceapi.nets.tinyFaceDetector },
                    { n: 'Emotion_Core', net: faceapi.nets.faceExpressionNet },
                    { n: 'Bio_Metrics', net: faceapi.nets.ageGenderNet }
                ];

                for (let i = 0; i < models.length; i++) {
                    loadStatus.innerText = `LOADING MODULE: ${models[i].n.toUpperCase()}...`;
                    log(`HTTP_GET: /weights/${models[i].n.toLowerCase()}_shards.json`, true);
                    await models[i].net.loadFromUri(MODEL_URL);
                    barFill.style.width = ((i + 1) / models.length * 100) + "%";
                }

                log("SUCCESS: Biometric link established.");
                setTimeout(() => {
                    document.getElementById('overlay').style.display = 'none';
                    watermark.style.display = 'block';
                    runEngine();
                }, 600);

            } catch (err) {
                log("ERROR: Weights fetch failed. Check connection.");
                loadStatus.innerText = "INITIALIZATION FAILED";
                loadStatus.style.color = "red";
            }
        }

        function runEngine() {
            const canvas = faceapi.createCanvasFromMedia(video);
            document.getElementById('wrapper').append(canvas);
            const size = { width: video.offsetWidth, height: video.offsetHeight };
            faceapi.matchDimensions(canvas, size);

            setInterval(async () => {
                const options = new faceapi.TinyFaceDetectorOptions({ inputSize: 128, scoreThreshold: 0.5 });
                const detections = await faceapi.detectAllFaces(video, options)
                    .withFaceExpressions().withAgeAndGender();

                const resized = faceapi.resizeResults(detections, size);
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (resized.length > 0) {
                    const { age, gender, expressions } = resized[0];
                    const emotion = Object.keys(expressions).reduce((a, b) => expressions[a] > expressions[b] ? a : b);
                    
                    vals.g.innerText = gender.toUpperCase();
                    vals.a.innerText = Math.round(age) + " YRS";
                    vals.e.innerText = emotion.toUpperCase();
                    Object.values(cards).forEach(c => c.classList.add('active'));

                    // Blue Scanner Box
                    const { x, y, width, height } = resized[0].detection.box;
                    ctx.strokeStyle = '#5efcff';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(x, y, width, height);
                } else {
                    Object.values(vals).forEach(v => v.innerText = "--");
                    Object.values(cards).forEach(c => c.classList.remove('active'));
                    vals.g.innerText = "SCANNING";
                }
            }, 180);
        }
    </script>
</body>
</html>
